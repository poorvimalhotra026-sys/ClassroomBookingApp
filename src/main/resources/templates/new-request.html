<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Event Request</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; padding: 40px; }
        .form-container { background: #1e1e1e; padding: 30px; border-radius: 15px; border: 1px solid #333; }
        .form-control, .form-select { background-color: #2c2c2c; border: 1px solid #444; color: white; }
        .form-control:focus { background-color: #2c2c2c; color: white; border-color: #0d6efd; box-shadow: none; }
        .section-title { border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; color: #0d6efd; }
    </style>
</head>
<body>
<div class="container">
    <div class="form-container shadow-lg">
        <h2 class="section-title">Submit Event Request</h2>

        <form action="/bookings/submit" method="post">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Event Name</label>
                    <input type="text" name="eventName" class="form-control" placeholder="e.g. AI Symposium" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Teacher In-Charge</label>
                    <select name="teacherEmail" class="form-select" required>
                        <option value="">Select Teacher...</option>
                        <option value="hemal.dalal@nmims.in">Prof. Hemal Dalal</option>
                        <option value="ishani.saha@nmims.in">Prof. Ishani Saha</option>
                        <option value="jash.mehta@nmims.in">Prof. Jash Mehta</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Date</label>
                    <input type="date" name="eventDate" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Time Slot</label>
                    <select name="timeSlot" class="form-select" required>
                        <option value="8:00-9:00">8:00-9:00</option>
                        <option value="9:00-10:00">9:00-10:00</option>
                        <option value="10:00-11:00">10:00-11:00</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Room Category</label>
                    <select name="roomType" class="form-select" id="roomType" required>
                        <option value="CR">Classroom (CR)</option>
                        <option value="CL">Lab (CL)</option>
                        <option value="MINI_AUDI">Mini Auditorium</option>
                        <option value="SEMINAR_HALL">Seminar Hall</option>
                        <option value="CANTEEN">AC Canteen</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="eventDescription" class="form-control" rows="3"></textarea>
            </div>

            <h5 class="mt-4 mb-3 text-secondary">Hardware Requirements</h5>
            <div class="row mb-3">
                <div class="col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="needsSmartboard"> Smartboard</div></div>
                <div class="col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="needsProjector"> Projector</div></div>
                <div class="col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="needsMicSpeakers"> Mic & Speakers</div></div>
                <div class="col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="needsComputers"> Computers (Labs)</div></div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Chairs Required</label>
                    <input type="number" name="chairsRequired" class="form-control" value="0">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Tables Required</label>
                    <input type="number" name="tablesRequired" class="form-control" value="0">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Food List (College Caterer Menu Items)</label>
                <textarea name="foodList" class="form-control" rows="2" placeholder="List items if booking AC Canteen..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary px-5">Submit to Teacher</button>
        </form>
    </div>
</div>
</body>
</html>
