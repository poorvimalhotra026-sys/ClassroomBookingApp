<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>NMIMS | Classroom Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .sidebar { background-color: #1e1e1e; height: 100vh; border-right: 1px solid #333; }
        .card { background-color: #1e1e1e; border: 1px solid #333; color: white; }
        .btn-primary { background-color: #0d6efd; border: none; }
        .btn-primary:hover { background-color: #0b5ed7; }
        .nav-link { color: #b0b0b0; }
        .nav-link:hover { color: #fff; background-color: #2c2c2c; }
        .status-pending { color: #ffca28; }
        .status-approved { color: #66bb6a; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block sidebar">
            <div class="position-sticky pt-3">
                <h4 class="px-3 mb-4 text-primary">NMIMS Portal</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/bookings/new">New Request</a></li>
                    <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
                </ul>
            </div>
        </nav>

        <main class="col-md-10 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div th:replace="${content}"></div>
        </main>
    </div>
</div>
</body>
</html>
