<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; height: 100vh; display: flex; align-items: center; }
        .card { background: #111; border: 2px solid #fff; padding: 40px; width: 400px; margin: auto; }
        input { background: #fff !important; color: #000 !important; font-weight: bold; }
        .btn-primary { background: #007bff; border: none; font-weight: bold; height: 50px; }
    </style>
</head>
<body>
<div class="card shadow-lg">
    <h2 class="text-center mb-4 text-white">NMIMS Login</h2>
    <form th:action="@{/login}" method="post">
        <input type="email" name="email" class="form-control mb-3" placeholder="Email (e.g. jash.mehta@nmims.in)" required>
        <input type="password" name="password" class="form-control mb-4" placeholder="Password" required>
        <button type="submit" class="btn btn-primary w-100">SIGN IN</button>
    </form>
</div>
</body>
</html>
