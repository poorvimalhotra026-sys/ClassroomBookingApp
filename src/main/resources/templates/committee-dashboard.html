<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Committee Portal | NMIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #dc3545; padding: 30px; font-family: 'Segoe UI', sans-serif; }
        .box { background: #111; border: 1px solid #444; padding: 25px; border-radius: 12px; margin-bottom: 30px; }
        label { font-weight: bold; color: #0d6efd; margin-bottom: 8px; }
        /* High-Visibility Inputs */
        input, select {
            background: #fff !important;
            color: #000 !important;
            font-weight: bold !important;
            border: 2px solid #0d6efd !important;
        }
        .table { color: #000 !important; border-color: #444; }
        .status-badge { padding: 5px 12px; border-radius: 15px; font-size: 0.8rem; font-weight: bold; }
        .bg-pending-teacher { background: #ffc107; color: #000; }
        .bg-pending-admin { background: #17a2b8; color: #fff; }
        .bg-approved { background: #28a745; color: #fff; }
        .bg-rejected { background: #dc3545; color: #fff; }
    </style>
</head>
<body class="container">
<div class="d-flex justify-content-between align-items-center mb-5">
    <h2 class="fw-bold">NMIMS COMMITTEE PORTAL</h2>
    <div class="text-end">
        <p class="mb-0 text-secondary">Logged in as: <span class="text-white" th:text="${user.name}"></span></p>
        <a href="/logout" class="btn btn-sm btn-outline-danger mt-1">LOGOUT</a>
    </div>
</div>

<div class="box shadow-lg">
    <h4 class="text-primary fw-bold mb-4">Request a Venue</h4>
    <form th:action="@{/bookings/committee/request}" method="post" class="row g-3">
        <div class="col-md-6">
            <label>Event Name / Purpose</label>
            <input type="text" name="eventName" class="form-control" placeholder="e.g. AI Research Symposium" required>
        </div>
        <div class="col-md-6">
            <label>Faculty In-Charge</label>
            <select name="teacherEmail" class="form-select" required>
                <option value="" disabled selected>Select a Teacher</option>
                <option th:each="t : ${teachers}" th:value="${t.email}" th:text="${t.name}"></option>
            </select>
        </div>
        <div class="col-md-4">
            <label>Date</label>
            <input type="date" name="eventDate" class="form-control" required>
        </div>
        <div class="col-md-4">
            <label>Time Slot</label>
            <input type="text" name="timeSlot" class="form-control" placeholder="e.g. 10:00-11:00" required>
        </div>
        <div class="col-md-4">
            <label>Venue Type</label>
            <select name="roomType" class="form-select">
                <option value="Classroom">Classroom</option>
                <option value="Lab">Lab</option>
                <option value="Mini Audi">Mini Audi</option>
                <option value="Seminar Hall">Seminar Hall</option>
                <option value="AC Canteen">AC Canteen</option>
            </select>
        </div>
        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">SUBMIT BOOKING REQUEST</button>
        </div>
    </form>
</div>
<table class="table table-hover">
    <thead>
    <tr>
        <th>Event</th>
        <th>Submission Date</th>
        <th>Current Status</th>
        <th>Details Received (Room/Remark)</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="req : ${requests}">
        <td th:text="${req.eventName}"></td>
        <td th:text="${req.submissionDate}"></td>
        <td th:text="${req.status}"></td>
        <td class="text-warning">
            <span th:if="${req.allottedRoomNumber != null}" th:text="'Allotted: ' + ${req.allottedRoomNumber}"></span>
            <span th:if="${req.rejectionReason != null}" th:text="'Feedback: ' + ${req.rejectionReason}"></span>
            <span th:if="${req.allottedRoomNumber == null && req.rejectionReason == null}">Processing...</span>
        </td>
    </tr>
    </tbody>
</table>
</body>
